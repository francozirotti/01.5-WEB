  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

\" href=\"index.html#contacto\" style=\"font-size:12px;font-weight:400;letter-spacing:.1em;text-transform:uppercase;color:#4A4A4C;\"><span class=\"lang-es\">Contacto<\u002Fspan><span class=\"lang-en\">Contact<\u002Fspan><\u002Fa>\n        <span style=\"display:flex;align-items:center;gap:7px;font-size:11px;font-weight:500;letter-spacing:.12em;color:#8C8C8E;border-left:1px solid #D4D2CE;padding-left:clamp(14px,1.8vw,22px);\">\n          <button onclick=\"{{ setES }}\" style=\"background:none;border:none;cursor:pointer;padding:2px 1px;letter-spacing:.12em;color:{{ esColor }};\">ES<\u002Fbutton>\n          <span style=\"opacity:.5;\">/<\u002Fspan>\n          <button onclick=\"{{ setEN }}\" style=\"background:none;border:none;cursor:pointer;padding:2px 1px;letter-spacing:.12em;color:{{ enColor }};\">EN<\u002Fbutton>\n        <\u002Fspan>\n      <\u002Fnav>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- PAGE HERO -->\n  <section style=\"position:relative;max-width:1320px;margin:0 auto;padding:clamp(48px,7vw,104px) clamp(20px,5vw,56px) clamp(40px,6vw,72px);overflow:hidden;\">\n    <div style=\"position:absolute;top:0;right:clamp(-40px,2vw,40px);width:min(34vw,400px);opacity:.05;pointer-events:none;\"><img src=\"cf3e518a-dda4-4f49-8fb3-00032ba56adb\" alt=\"\" style=\"width:100%;display:block;\"><\u002Fdiv>\n    <a class=\"nav-link\" href=\"index.html#servicios\" style=\"position:relative;display:inline-flex;align-items:center;gap:8px;font-size:11px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:#8C8C8E;margin-bottom:clamp(28px,4vw,48px);\">← <span class=\"lang-es\">Líneas de servicio<\u002Fspan><span class=\"lang-en\">Service lines<\u002Fspan><\u002Fa>\n    <p style=\"position:relative;font-size:12px;font-weight:500;letter-spacing:.3em;text-transform:uppercase;color:var(--accent);margin-bottom:18px;\">Línea 01<\u002Fp>\n    <h1 style=\"position:relative;font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(58px,11vw,156px);line-height:.92;letter-spacing:.01em;\">FORMA<\u002Fh1>\n    <p style=\"position:relative;font-family:'Cormorant Garamond',serif;font-style:italic;font-size:clamp(22px,3vw,38px);font-weight:400;color:#4A4A4C;margin-top:12px;\"><span class=\"lang-es\">Formación aplicada en IA y Project Management<\u002Fspan><span class=\"lang-en\">Applied training in AI and Project Management<\u002Fspan><\u002Fp>\n    <p style=\"position:relative;font-size:clamp(15px,1.5vw,18px);font-weight:300;line-height:1.7;color:#4A4A4C;max-width:54ch;margin-top:clamp(28px,3vw,40px);\">\n      <span class=\"lang-es\">Formación práctica para equipos que necesitan herramientas reales, no teoría. Cada sesión arranca con un caso real y termina con un entregable que el participante puede aplicar el lunes.<\u002Fspan>\n      <span class=\"lang-en\">Hands-on training for teams that need real tools, not theory. Every session starts with a real case and ends with a deliverable the participant can apply on Monday.<\u002Fspan>\n    <\u002Fp>\n    <div style=\"position:relative;display:flex;gap:clamp(24px,4vw,56px);flex-wrap:wrap;margin-top:clamp(36px,5vw,56px);padding-top:26px;border-top:1px solid #E5E3DF;\">\n      <div style=\"display:flex;flex-direction:column;gap:5px;\"><span style=\"font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:500;line-height:1;\">8–16h<\u002Fspan><span style=\"font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#8C8C8E;\"><span class=\"lang-es\">por curso<\u002Fspan><span class=\"lang-en\">per course<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:5px;\"><span style=\"font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:500;line-height:1;\">≤12<\u002Fspan><span style=\"font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#8C8C8E;\"><span class=\"lang-es\">participantes<\u002Fspan><span class=\"lang-en\">participants<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:5px;\"><span style=\"font-family:'Cormorant Garamond',serif;font-size:30px;font-weight:500;line-height:1;color:var(--accent);\">0 €<\u002Fspan><span style=\"font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:#8C8C8E;\"><span class=\"lang-es\">coste vía FUNDAE<\u002Fspan><span class=\"lang-en\">cost via FUNDAE<\u002Fspan><\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- VALUE -->\n  <section style=\"background:#1C1C1E;color:#FAFAF8;\">\n    <div style=\"max-width:1320px;margin:0 auto;padding:clamp(56px,8vw,104px) clamp(20px,5vw,56px);\">\n      <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:clamp(32px,4vw,48px);\"><span style=\"font-size:11px;font-weight:500;letter-spacing:.28em;text-transform:uppercase;color:var(--accent);\"><span class=\"lang-es\">Propuesta de valor<\u002Fspan><span class=\"lang-en\">Value proposition<\u002Fspan><\u002Fspan><span style=\"flex:1;height:1px;background:#333;\"><\u002Fspan><\u002Fdiv>\n      <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:400;font-size:clamp(26px,4vw,52px);line-height:1.14;max-width:24ch;\">\n        <span class=\"lang-es\">FORMA enseña lo que un PM senior usa <span style=\"color:var(--accent);font-style:italic;\">en obra, en comité y en la sala<\u002Fspan> con el cliente.<\u002Fspan>\n        <span class=\"lang-en\">FORMA teaches what a senior PM actually uses <span style=\"color:var(--accent);font-style:italic;\">on site, in committee and in the room<\u002Fspan> with the client.<\u002Fspan>\n      <\u002Fh2>\n      <p style=\"font-size:clamp(14px,1.4vw,17px);font-weight:300;line-height:1.7;color:#9C9C9E;max-width:62ch;margin-top:clamp(24px,3vw,36px);\">\n        <span class=\"lang-es\">La mayoría de la formación en IA y PM es teórica o genérica. Aquí no. La línea está diseñada para financiarse vía FUNDAE: el coste formativo se cubre con los créditos de formación de la empresa. Coste efectivo para el cliente: 0 €.<\u002Fspan>\n :flex;flex-direction:column;gap:0;\">\n          <div style=\"display:grid;grid-template-columns:minmax(90px,auto) 1fr;gap:12px 22px;padding:13px 0;border-bottom:1px solid #E5E3DF;\"><span style=\"font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#8C8C8E;padding-top:2px;\"><span class=\"lang-es\">Duración<\u002Fspan><span class=\"lang-en\">Duration<\u002Fspan><\u002Fspan><span style=\"font-size:14px;font-weight:300;color:#4A4A4C;line-height:1.5;\">16h · <span class=\"lang-es\">2 jornadas de 8h o 4 módulos de 4h<\u002Fspan><span class=\"lang-en\">2 days of 8h or 4 modules of 4h<\u002Fspan><\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:minmax(90px,auto) 1fr;gap:12px 22px;padding:13px 0;border-bottom:1px solid #E5E3DF;\"><span style=\"font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#8C8C8E;padding-top:2px;\"><span class=\"lang-es\">Perfil<\u002Fspan><span class=\"lang-en\">Profile<\u002Fspan><\u002Fspan><span style=\"font-size:14px;font-weight:300;color:#4A4A4C;line-height:1.5;\"><span class=\"lang-es\">Project Managers, arquitectos, jefes de obra, técnicos de expansión, directores de operaciones<\u002Fspan><span class=\"lang-en\">Project Managers, architects, site managers, expansion technicians, operations directors<\u002Fspan><\u002Fspan><\u002Fdiv>\n          <div style=\"display:grid;grid-template-columns:minmax(90px,auto) 1fr;gap:12px 22px;padding:13px 0;border-bottom:1px solid #E5E3DF;\"><span style=\"font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#8C8C8E;padding-top:2px;\"><span class=\"lang-es\">Contenido<\u002Fspan><span class=\"lang-en\">Content<\u002Fspan><\u002Fspan><span style=\"font-size:14px;font-weight:300;color:#4A4A4C;line-height:1.5;\"><span class=\"lang-es\">Prompting aplicado a PM · Automatización de reportes · IA para fichas técnicas y presupuestos · Flujos con n8n · Casos reales de retail y construcción<\u002Fspan><span class=\"lang-en\">Applied prompting n        <p style=\"font-size:clamp(14px,1.4vw,16px);font-weight:300;line-height:1.7;color:#4A4A4C;\">\n          <span class=\"lang-es\">FUNDAE gestiona los créditos de formación continua de las empresas españolas. Cada empresa tiene un crédito anual proporcional a su masa salarial. La formación bonificada cubre el 100 % del coste para pequeñas empresas y entre el 75–100 % para medianas y grandes.<\u002Fspan>\n          <span class=\"lang-en\">FUNDAE manages the continuous-training credits of Spanish companies. Each company has an annual credit proportional to its payroll. Subsidized training covers 100% of the cost for small companies and 75–100% for medium and large ones.<\u002Fspan>\n        <\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:12px;padding-top:18px;border-top:1px solid #D4D2CE;\">\n          <div style=\"display:flex;gap:14px;align-items:baseline;\"><span style=\"font-family:'Cormorant Garamond',serif;color:var(--accent);font-size:16px;\">01<\u002Fspan><span style=\"font-size:14px;font-weight:300;color:#4A4A4C;\"><span class=\"lang-es\">Alta como entidad organizadora o acuerdo con una gestora acreditada.<\u002Fspan><span class=\"lang-en\">Registration as organizing entity or agreement with an accredited manager.<\u002Fspan><\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:14px;align-items:baseline;\"><span style=\"font-family:'Cormorant Garamond',serif;color:var(--accent);font-size:16px;\">02<\u002Fspan><span style=\"font-size:14px;font-weight:300;color:#4A4A4C;\"><span class=\"lang-es\">Comunicación previa a FUNDAE con 7 días de antelación.<\u002Fspan><span class=\"lang-en\">Prior notice to FUNDAE 7 days in advance.<\u002Fspan><\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:14px;align-items:baseline;\"><span style=\"font-family:'Cormorant Garamond',serif;color:var(--accent);font-size:16px;\">03<\u002Fspan><span style=\"font-size:14px;font-weight:300;color:#4A4A4C;\"><span class=\"lang-es\">Partes de asistencia y certificado. Zirotti gestiona el proceso completo o apoya en la gestión propia.<\u002Fspan><span class=\"lang-en\">Attendance records and certificate. Zirotti manages the full process or supports your own.<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- CTA -->\n  <section style=\"background:#1C1C1E;color:#FAFAF8;\">\n    <div style=\"max-width:1320px;margin:0 auto;padding:clamp(56px,8vw,104px) clamp(20px,5vw,56px);display:flex;flex-wrap:wrap;gap:32px;align-items:center;justify-content:space-between;\">\n      <div>\n        <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:400;font-size:clamp(28px,4vw,52px);line-height:1.1;max-width:18ch;\"><span class=\"lang-es\">¿Formamos a tu equipo este trimestre?<\u002Fspan><span class=\"lang-en\">Shall we train your team this quarter?<\u002Fspan><\u002Fh2>\n        <p style=\"font-size:14px;font-weight:300;color:#9C9C9E;margin-top:16px;max-width:48ch;\"><span class=\"lang-es\">Por sesión cerrada o pack trimestral (3–4 sesiones con 10 % de descuento). Ciclo habitual: 2–4 semanas.<\u002Fspan><span class=\"lang-en\">Per closed session or quarterly pack (3–4 sessions with 10% discount). Typical cycle: 2–4 weeks.<\u002Fspan><\u002Fp>\n      <\u002Fdiv>\n      <a class=\"btn-fill\" href=\"index.html#contacto\" style=\"display:inline-flex;align-items:center;padding:16px 32px;background:var(--accent);border:1px solid var(--accent);color:#1C1C1E;font-size:12px;font-weight:500;letter-spacing:.14em;text-transform:uppercase;white-space:nowrap;\"><span class=\"lang-es\">Reservar una consulta<\u002Fspan><span class=\"lang-en\">Book a consultation<\u002Fspan><\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"background:#141416;color:#9C9C9E;\">\n    <div style=\"max-width:1320px;margin:0 auto;padding:clamp(44px,6vw,72px) clamp(20px,5vw,56px);display:flex;flex-wrap:wrap;gap:40px;justify-content:space-betw uot;,&quot;options&quot;:[&quot;#C9A882&quot;,&quot;#A8845A&quot;,&quot;#1C1C1E&quot;],&quot;default&quot;:&quot;#C9A882&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Marca&quot;}}\">\nclass Component extends DCLogic {\n  state = { lang: 'es', cookieOpen: false };\n\n  componentDidMount() {\n    try {\n      const stored = localStorage.getItem('ziLang');\n      const lang = stored === 'en' ? 'en' : 'es';\n      document.documentElement.setAttribute('data-lang', lang);\n      if (lang !== this.state.lang) this.setState({ lang });\n    } catch (e) {}\n    try { if (!localStorage.getItem('ziCookieConsent')) this.setState({ cookieOpen: true }); } catch (e) {}\n    this.applyAccent();\n    this._onScroll = () => {\n      const h = document.querySelector('[data-header]');\n      if (h) h.setAttribute('data-scrolled', window.scrollY > 20 ? '1' : '0');\n    };\n    window.addEventListener('scroll', this._onScroll, { passive: true });\n  }\n\n  componentDidUpdate() { this.applyAccent(); }\n  componentWillUnmount() { if (this._onScroll) window.removeEventListener('scroll', this._onScroll); }\n\n  applyAccent() {\n    const map = { champagne: '#C9A882', gold: '#A8845A', ink: '#1C1C1E' };\n    const v = map[this.props.accentColor] || this.props.accentColor || '#C9A882';\n    document.documentElement.style.setProperty('--accent', v);\n  }\n\n  setLang(lang) {\n    document.documentElement.setAttribute('data-lang', lang);\n    try { localStorage.setItem('ziLang', lang); } catch (e) {}\n    this.setState({ lang });\n  }\n  setConsent(v) { try { localStorage.setItem('ziCookieConsent', v); } catch (e) {} this.setState({ cookieOpen: false }); }\n\n  renderVals() {\n    const isES = this.state.lang === 'es';\n    return {\n      setES: () => this.setLang('es'),\n      setEN: () => this.setLang('en'),\n      esColor: isES ? '#1C1C1E' : '#8C8C8E',\n      enColor: isES ? '#8C8C8E' : '#1C1C1E',\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
